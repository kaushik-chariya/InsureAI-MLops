<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InsureAI Premium Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */

.bg-blur{
    position:fixed;
    border-radius:50%;
    filter:blur(120px);
    opacity:.5;
    z-index:0;
}

.b1{
    width:400px;
    height:400px;
    background:#7c3aed;
    top:-100px;
    left:-100px;
}

.b2{
    width:400px;
    height:400px;
    background:#2563eb;
    bottom:-100px;
    right:-100px;
}

/* APP */

.app{
    display:flex;
    min-height:100vh;
    position:relative;
    z-index:2;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    background:rgba(255,255,255,.04);
    border-right:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(25px);

    padding:30px 20px;

    display:flex;
    flex-direction:column;
}

.logo{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:50px;
}

.logo-icon{
    width:58px;
    height:58px;
    border-radius:18px;

    background:linear-gradient(135deg,#7c3aed,#2563eb);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;

    box-shadow:0 10px 35px rgba(124,58,237,.45);
}

.logo h2{
    font-size:25px;
}

.logo span{
    color:#94a3b8;
    font-size:13px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu-item{
    padding:16px 18px;
    border-radius:18px;

    display:flex;
    align-items:center;
    gap:14px;

    cursor:pointer;

    transition:.3s;
    color:#cbd5e1;
}

.menu-item:hover,
.menu-item.active{
    background:linear-gradient(
        135deg,
        rgba(124,58,237,.35),
        rgba(37,99,235,.2)
    );
}

/* PREMIUM CARD */

.premium-card{
    margin-top:auto;

    padding:28px;
    border-radius:28px;

    background:linear-gradient(
        135deg,
        rgba(124,58,237,.35),
        rgba(37,99,235,.2)
    );

    border:1px solid rgba(255,255,255,.08);
}

.premium-card h1{
    font-size:52px;
    margin:10px 0;
}

/* MAIN */

.main{
    flex:1;
    padding:35px;
}

/* TOPBAR */

.topbar{
    margin-bottom:30px;
}

.topbar h1{
    font-size:42px;
    margin-bottom:8px;
}

.topbar p{
    color:#94a3b8;
}

/* GLASS CARD */

.glass-card{
    padding:35px;

    border-radius:35px;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);
}

/* FORM */

.form-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);

    gap:22px;

    margin-top:35px;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.input-group label{
    color:#cbd5e1;
    font-size:14px;
    font-weight:600;
}

.premium-input{
    height:60px;

    border:none;
    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    padding:0 18px;

    color:white;
    font-size:15px;

    transition:.3s;
}

.premium-input:focus{
    border:1px solid #7c3aed;
    box-shadow:0 0 20px rgba(124,58,237,.4);
}

.premium-input::placeholder{
    color:#94a3b8;
}

/* BUTTON */

.predict-btn{
    width:100%;
    height:65px;

    margin-top:35px;

    border:none;
    border-radius:22px;

    background:linear-gradient(
        135deg,
        #7c3aed,
        #2563eb
    );

    color:white;

    font-size:18px;
    font-weight:800;

    cursor:pointer;

    transition:.3s;

    box-shadow:0 15px 35px rgba(124,58,237,.4);

    position:relative;
    overflow:hidden;
}

.predict-btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.35),
        transparent
    );
    transition:.7s;
}

.predict-btn:hover::before{
    left:100%;
}

.predict-btn:hover{
    transform:translateY(-4px);
}

/* RESULT */

.result-box{
    margin-top:25px;
    padding:25px;
    border-radius:24px;
    text-align:center;
    font-size:28px;
    font-weight:800;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    animation:pop .5s ease;
}

@keyframes pop{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.sad{
    font-size:90px;
    margin-top:20px;
    animation:bounce 1s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

/* RESPONSIVE */

@media(max-width:1200px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

}

</style>

</head>

<body>

<div class="bg-blur b1"></div>
<div class="bg-blur b2"></div>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <div class="logo-icon">
                <i class="ti ti-sparkles"></i>
            </div>

            <div>
                <h2>InsureAI</h2>
                <span>Premium Predictor</span>
            </div>

        </div>

        <div class="menu">

            <div class="menu-item active">
                🚀 Dashboard
            </div>

            <div class="menu-item">
                👥 Customers
            </div>

            <div class="menu-item">
                📊 Analytics
            </div>

        </div>

        <div class="premium-card">

            <span>AI Accuracy</span>

            <h1>98.4%</h1>

            <p>XGBoost Model</p>

        </div>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <div class="topbar">

            <h1>🚗 Vehicle Insurance Predictor</h1>

            <p>
                Realtime AI-based prediction system
            </p>

        </div>

        <!-- FORM -->

        <form action="/" method="POST" class="glass-card">

            <div class="form-grid">

                <div class="input-group">
                    <label>👨 Gender</label>

                    <select class="premium-input" name="Gender">

                        <option value="1">👨 Male</option>

                        <option value="0">👩 Female</option>

                    </select>
                </div>

                <div class="input-group">
                    <label> Age</label>

                    <input type="number"
                           class="premium-input"
                           name="Age"
                           placeholder=" Enter customer age"
                           required>
                </div>

                <div class="input-group">
                    <label>🚗 Driving License</label>

                    <select class="premium-input" name="Driving_License">

                        <option value="1">✅ Yes</option>

                        <option value="0">❌ No</option>

                    </select>
                </div>

                <div class="input-group">
                    <label aria-placeholder="number">🌍 Region Code</label>

                    <input type="number"
                           class="premium-input"
                           name="Region_Code"
                           placeholder="🌍 Enter region code"
                           required>
                </div>

                <div class="input-group">
                    <label>🛡️ Previously Insured</label>

                    <select class="premium-input" name="Previously_Insured">

                        <option value="1">✅ Yes</option>

                        <option value="0">❌ No</option>

                    </select>
                </div>

                <div class="input-group">
                    <label>💰 Annual Premium</label>

                    <input type="number"
                           class="premium-input"
                           name="Annual_Premium"
                           placeholder="💰 Annual premium amount"
                           required>
                </div>

                <div class="input-group">
                    <label>📡 Policy Sales Channel</label>

                    <input type="number"
                           class="premium-input"
                           name="Policy_Sales_Channel"
                           placeholder="📡 Sales channel id"
                           required>
                </div>

                <div class="input-group">
                    <label>📅 Vintage</label>

                    <input type="number"
                           class="premium-input"
                           name="Vintage"
                           placeholder="📅 Customer vintage days"
                           required>
                </div>

                <div class="input-group">
                    <label>🚘 Vehicle Age &lt; 1 Year</label>

                    <select class="premium-input" name="Vehicle_Age_lt_1_Year">

                        <option value="1">✅ Yes</option>

                        <option value="0">❌ No</option>

                    </select>
                </div>

                <div class="input-group">
                    <label>🚙 Vehicle Age &gt; 2 Years</label>

                    <select class="premium-input" name="Vehicle_Age_gt_2_Years">

                        <option value="1">✅ Yes</option>

                        <option value="0">❌ No</option>

                    </select>
                </div>

                <div class="input-group">
                    <label>💥 Vehicle Damage</label>

                    <select class="premium-input" name="Vehicle_Damage_Yes">

                        <option value="1">✅ Yes</option>

                        <option value="0">❌ No</option>

                    </select>
                </div>

            </div>

            <button type="submit" class="predict-btn">

                ✨ Predict Insurance Purchase 🚀

            </button>

        </form>

        <!-- RESULT -->

        {% if context %}

        <div class="result-box">

            {{ context }}

            {% if "Not Interested" not in context %}

            <script>

                setTimeout(() => {

                    confetti({
                        particleCount:250,
                        spread:180,
                        origin:{ y:0.6 }
                    });

                },400);

            </script>

            {% else %}

            <div class="sad">
                😢
            </div>

            {% endif %}

        </div>

        {% endif %}

    </main>

</div>

</body>
</html>
